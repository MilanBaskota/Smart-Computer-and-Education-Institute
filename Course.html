<!DOCTYPE html>

<head>

<body>
    <header class="primary-header">
        <div class="container">
            <a href="Index.html"><img src="Smart-Logo.png" alt="smart_computer" height="195px" width="auto"></a>
            <nav class="primary-navigation">
                <ul class="nav-list">
                    <li><a href="Index.html" class="nav-links ">Home</a></li>
                    <li><a href="About.html" class="nav-links">About</a></li>
                    <li><a href="Course.html" class="nav-links active">Course</a></li>
                    <li><a href="Timeshift.html" class="nav-links">Timeshift</a></li>
                    <li><a href="Contact.html" class="nav-links">Contact</a></li>
                    <li><a href="Gallery.html" class="nav-links">Gallery</a></li>

            </nav>
            <button class="primary-btn">Log In</button>

            <button class="ham-btn" id="hamBtn">
                <span></span>
                <span></span>
                <span></span>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="Index.html">Home</a>
            <a href="About.html">About</a>
            <a href="Course.html" class="active">Course</a>
            <a href="Timeshift.html">Timeshift</a>

    </header>
    <main>
        <section>
            
        </section>
    </main>



    <script>

        // 1. Grab the button and the menu
        const hamBtn = document.getElementById('hamBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        // 2. Click hamburger → open/close menu
        hamBtn.addEventListener('click', () => {
            hamBtn.classList.toggle('open');      // toggles X animation
            mobileMenu.classList.toggle('open'); // slides menu open/closed
        });

        // 3. Click any mobile link → close menu automatically
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                hamBtn.classList.remove('open');
                mobileMenu.classList.remove('open');

                // also update active link
                mobileMenu.querySelectorAll('a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });

        // 4. Active link on desktop nav
        document.querySelectorAll('.nav-links').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelectorAll('.nav-links').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });

    </script>
</body>

</html>
